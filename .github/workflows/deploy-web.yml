name: Deploy Web to Vercel

# Production: https://firstcalllaw.vercel.app/
# Vercel project: https://vercel.com/akhimass-projects/firstcall
#
# Use Vercel Git on that project (repo akhimass/devOS, root directory web) for
# automatic deploys. This workflow is manual-only backup via Actions.

on:
  workflow_dispatch:

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to firstcalllaw
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
